<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Izin Toilet Realtime Multi-PC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="p-2.5 bg-indigo-600/10 rounded-xl border border-indigo-500/30 text-xl">🚽</div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide text-indigo-400">Monitoring Izin Toilet</h1>
                    <p class="text-xs text-slate-400">Multi-PC Local Network Synchronized System</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div id="status-koneksi" class="flex items-center space-x-2 bg-emerald-500/10 border border-emerald-500/30 px-3 py-1.5 rounded-full text-xs font-medium text-emerald-400">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    <span>Sistem Sinkronisasi Aktif</span>
                </div>
                <div class="bg-slate-950 border border-slate-800 px-4 py-1.5 rounded-xl flex items-center space-x-2">
                    <span class="text-slate-500 text-sm">⏰</span>
                    <span id="jam-digital" class="font-mono text-sm tracking-widest text-indigo-400 font-bold">00:00:00</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 sm:p-6 space-y-6">
        
        <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
            <label class="block text-sm font-medium text-slate-400 mb-2">Nama Personel / Nomor PC :</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="input-nama" placeholder="Contoh: Budi atau Meja 12..." 
                       class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all">
                <button onclick="ambilIzin()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-3 rounded-xl shadow-lg flex items-center justify-center space-x-2 transition-all cursor-pointer">
                    <span>🚀</span>
                    <span>Ambil Izin Keluar</span>
                </button>
            </div>
        </section>

        <section class="bg-slate-900 border border-slate-800 rounded-2xl shadow-lg overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div class="flex items-center space-x-2">
                    <span class="text-lg">📋</span>
                    <h2 class="font-semibold text-slate-200">Daftar Log Aktif</h2>
                </div>
                <span id="badge-count" class="bg-indigo-600/10 border border-indigo-500/30 text-indigo-400 text-xs font-bold px-2.5 py-1 rounded-full">0 Sedang Izin</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-slate-400 text-xs uppercase tracking-wider bg-slate-950/40">
                            <th class="p-4 w-16 text-center">No</th>
                            <th class="p-4">Nama / Keterangan</th>
                            <th class="p-4">Jam Keluar</th>
                            <th class="p-4">Durasi Istirahat</th>
                            <th class="p-4 text-center">Aksi Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-log" class="divide-y divide-slate-800/60 text-sm"></tbody>
                </table>
            </div>
            
            <div id="empty-state" class="p-12 text-center text-slate-500 space-y-2">
                <div class="text-3xl">☕</div>
                <p>Semua personel ada di tempat. Tidak ada log aktif saat ini.</p>
            </div>
        </section>
    </main>

    <script>
        // Menggunakan BroadcastChannel bawaan browser (100% aman dari blokir internet)
        const channel = new BroadcastChannel('toilet_sync_channel');
        let daftarIzin = JSON.parse(localStorage.getItem('daftarIzin')) || [];

        function jalankanJam() {
            const sekarang = new Date();
            document.getElementById('jam-digital').innerText = sekarang.toTimeString().split(' ')[0];
        }
        setInterval(jalankanJam, 1000);
        jalankanJam();

        function simpanDanBroadcast() {
            localStorage.setItem('daftarIzin', JSON.stringify(daftarIzin));
            renderTabel();
            channel.postMessage({ tipe: 'UPDATE_DATA', data: daftarIzin });
        }

        function ambilIzin() {
            const input = document.getElementById('input-nama');
            const nama = input.value.trim();
            if (!nama) return alert("Masukkan nama terlebih dahulu!");

            const sekarang = new Date();
            const baru = {
                id: 'id_' + sekarang.getTime(),
                nama: nama,
                jamKeluar: sekarang.toTimeString().split(' ')[0].substring(0, 5),
                timestamp: sekarang.getTime()
            };

            daftarIzin.push(baru);
            input.value = "";
            simpanDanBroadcast();
        }

        function kembaliKeTempat(id) {
            daftarIzin = daftarIzin.filter(item => item.id !== id);
            simpanDanBroadcast();
        }

        channel.onmessage = (event) => {
            if (event.data.tipe === 'UPDATE_DATA') {
                daftarIzin = event.data.data;
                localStorage.setItem('daftarIzin', JSON.stringify(daftarIzin));
                renderTabel();
            }
        };

        function renderTabel() {
            const tbody = document.getElementById('tabel-log');
            const emptyState = document.getElementById('empty-state');
            const badgeCount = document.getElementById('badge-count');
            
            tbody.innerHTML = "";
            badgeCount.innerText = `${daftarIzin.length} Sedang Izin`;

            if (daftarIzin.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            daftarIzin.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 text-center text-slate-500 font-mono">${index + 1}</td>
                    <td class="p-4 font-semibold text-slate-200">👤 ${item.nama}</td>
                    <td class="p-4 font-mono text-slate-400">${item.jamKeluar}</td>
                    <td class="p-4 font-mono text-amber-400" id="timer-${item.id}">00m 00s</td>
                    <td class="p-4 text-center">
                        <button onclick="kembaliKeTempat('${item.id}')" class="bg-emerald-600/10 hover:bg-emerald-600 border border-emerald-500/30 text-emerald-400 hover:text-white text-xs px-3 py-1.5 rounded-lg transition-all cursor-pointer">✔ Kembali</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        setInterval(() => {
            const sekarang = new Date().getTime();
            daftarIzin.forEach(item => {
                const el = document.getElementById(`timer-${item.id}`);
                if (el) {
                    const selisih = Math.floor((sekarang - item.timestamp) / 1000);
                    const m = String(Math.floor(selisih / 60)).padStart(2, '0');
                    const s = String(selisih % 60).padStart(2, '0');
                    el.innerText = `${m}m ${s}s`;
                }
            });
        }, 1000);

        renderTabel();
    </script>
</body>
</html>
