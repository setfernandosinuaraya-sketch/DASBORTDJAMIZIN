<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Toilet Kantor</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; }
        .wrapper { max-width: 700px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        .jam-digital { font-family: monospace; font-size: 20px; color: #f59e0b; font-weight: bold; }
        .input-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background: #1d4ed8; }
        table { wIdth: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-size: 13px; text-transform: uppercase; }
        .btn-kembali { background: #dc2626; padding: 6px 12px; font-size: 13px; }
        .btn-kembali:hover { background: #b91c1c; }
        .empty-text { text-align: center; color: #64748b; padding: 30px; font-style: Italic; }
        .btn-reset { background: #475569; font-size: 12px; padding: 5px 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div>
            <h2 style="margin:0; color:#38bdf8;">🚽 Sistem Izin Toilet</h2>
            <small style="color: #94a3b8;">Local Multi-PC System</small>
        </div>
        <div id="jam" class="jam-digital">00:00:00</div>
    </div>

    <div class="input-box">
        <input type="text" id="nama" placeholder="Ketik nama Anda di sini..." autocomplete="off">
        <button type="button" onclick="tambahLog()">🚀 Ambil Izin Keluar</button>
    </div>

    <h3 style="margin: 0 0 10px 0; color: #e2e8f0;">📋 Daftar Aktif</h3>
    <table>
        <thead>
            <tr>
                <th style="width: 40px;">No</th>
                <th>Nama</th>
                <th>Jam</th>
                <th>Durasi</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabel-isi"></tbody>
    </table>
    
    <div id="kosong" class="empty-text">Semua personel ada di tempat.</div>

    <center>
        <button type="button" class="btn-reset" onclick="bersihkanSistem()">🔄 Reset Paksa Sistem (Klik jika macet)</button>
    </center>
</div>

<script>
    const bc = new BroadcastChannel('toilet_final_channel');
    let logs = JSON.parse(localStorage.getItem('toilet_final_logs')) || [];

    // Jam Realtime
    function clock() {
        document.getElementById('jam').innerText = new Date().toTimeString().split(' ')[0];
    }
    setInterval(clock, 1000);
    clock();

    // Tambah Data
    function tambahLog() {
        const txtNama = document.getElementById('nama');
        const valNama = txtNama.value.trim();

        if (!valNama) {
            alert("Nama tidak boleh kosong!");
            return;
        }

        const waktuSekarang = new Date();
        const data = {
            id: 'id_' + waktuSekarang.getTime(),
            nama: valNama,
            jamKeluar: waktuSekarang.toTimeString().split(' ')[0].substring(0, 5),
            time: waktuSekarang.getTime()
        };

        logs.push(data);
        txtNama.value = "";
        simpanData();
    }

    // Hapus Data
    function hapusLog(id) {
        logs = logs.filter(item => item.id !== id);
        simpanData();
    }

    // Simpan & Kirim Antar Tab / PC
    function simpanData() {
        localStorage.setItem('toilet_final_logs', JSON.stringify(logs));
        render();
        bc.postMessage({ tipe: 'UPDATE', data: logs });
    }

    // Terima data dari PC/Tab Sebelah
    bc.onmessage = (e) => {
        if (e.data.tipe === 'UPDATE') {
            logs = e.data.data;
            localStorage.setItem('toilet_final_logs', JSON.stringify(logs));
            render();
        }
    };

    // Tampilkan ke Tabel
    function render() {
        const tbody = document.getElementById('tabel-isi');
        const kosong = document.getElementById('kosong');
        tbody.innerHTML = "";

        if (logs.length === 0) {
            kosong.style.display = "block";
            return;
        }
        kosong.style.display = "none";

        logs.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#64748b;">${index + 1}</td>
                <td style="font-weight:bold;">👤 ${item.nama}</td>
                <td>${item.jamKeluar}</td>
                <td style="color:#fbbf24; font-weight:bold;" id="t-${item.id}">00m 00s</td>
                <td><button class="btn-kembali" onclick="hapusLog('${item.id}')">✔ Kembali</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Hitung Menit & Detik Berjalan
    setInterval(() => {
        const skrg = new Date().getTime();
        logs.forEach(item => {
            const el = document.getElementById(`t-${item.id}`);
            if (el) {
                const diff = Math.floor((skrg - item.time) / 1000);
                const m = String(Math.floor(diff / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                el.innerText = `${m}m ${s}s`;
            }
        });
    }, 1000);

    // Fungsi Reset Jika Browser Mengunci Error Lama
    function bersihkanSistem() {
        localStorage.clear();
        logs = [];
        simpanData();
        alert("Sistem berhasil direset bersih!");
        location.reload();
    }

    window.addEventListener('storage', () => {
        logs = JSON.parse(localStorage.getItem('toilet_final_logs')) || [];
        render();
    });

    render();
</script>

</body>
</html>
