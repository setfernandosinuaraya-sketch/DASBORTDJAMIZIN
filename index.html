<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Izin Toilet Mandiri</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #1e293b; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .title { margin: 0; color: #38bdf8; font-size: 20px; }
        .jam { font-family: monospace; font-size: 18px; color: #f59e0b; font-weight: bold; }
        .box-input { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .flex-input { display: flex; gap: 10px; margin-top: 8px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; }
        .btn-ambil { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-ambil:hover { background: #1d4ed8; }
        .table-section { background: #1e293b; border-radius: 12px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        th { padding: 12px; border-bottom: 2px solid #475569; color: #94a3b8; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        .btn-kembali { background: #dc2626; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-kembali:hover { background: #b91c1c; }
        .empty { text-align: center; color: #64748b; padding: 30px; }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div>
            <h1 class="title">🚽 Monitoring Izin Toilet</h1>
            <small style="color: #94a3b8;">Sistem Standalone Multi-PC Kantor</small>
        </div>
        <div id="live-jam" class="jam">00:00:00</div>
    </div>

    <!-- INPUT PANEL -->
    <div class="box-input">
        <label style="font-size: 14px; color: #94a3b8;">Nama Personel / Nomor PC :</label>
        <div class="flex-input">
            <input type="text" id="nama-personel" placeholder="Ketik nama Anda di sini..." autocomplete="off">
            <button type="button" class="btn-ambil" onclick="prosesIzinOut()">🚀 Ambil Izin Keluar</button>
        </div>
    </div>

    <!-- TABEL LOG -->
    <div class="table-section">
        <h3 style="margin-top: 0; color: #e2e8f0;">📋 Daftar Log Aktif</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 50px; text-align: center;">No</th>
                    <th>Nama Personel</th>
                    <th>Jam Keluar</th>
                    <th>Durasi Izin</th>
                    <th style="width: 100px; text-align: center;">Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-body"></tbody>
        </table>
        <div id="status-kosong" class="empty">☕ Semua personel ada di tempat.</div>
    </div>
</div>

<script>
    const sinkronChannel = new BroadcastChannel('office_toilet_channel');
    let dataLog = JSON.parse(localStorage.getItem('office_toilet_log')) || [];

    // Jam digital realtime
    function runningClock() {
        const waktu = new Date();
        document.getElementById('live-jam').innerText = waktu.toTimeString().split(' ')[0];
    }
    setInterval(runningClock, 1000);
    runningClock();

    // Fungsi proses input data (Sudah Diperbaiki)
    function prosesIzinOut() {
        const inputan = document.getElementById('nama-personel');
        const nama = inputan.value.trim();
        
        if (nama === "") {
            alert("Harap isi nama terlebih dahulu!");
            return;
        }

        const skrg = new Date();
        const dataBaru = {
            id: 'log_' + skrg.getTime(),
            nama: nama,
            jam: skrg.toTimeString().split(' ')[0].substring(0, 5),
            start: skrg.getTime()
        };

        dataLog.push(dataBaru);
        inputan.value = ""; 
        
        simpanDanKirim(); // <--- SEKARANG SUDAH BENAR
    }

    function hapusIzin(id) {
        dataLog = dataLog.filter(item => item.id !== id);
        simpanDanKirim();
    }

    function simpanDanKirim() {
        localStorage.setItem('office_toilet_log', JSON.stringify(dataLog));
        segarkanTabel();
        sinkronChannel.postMessage({ tipe: 'REFRESH_DATA', data: dataLog });
    }

    sinkronChannel.onmessage = (event) => {
        if (event.data.tipe === 'REFRESH_DATA') {
            dataLog = event.data.data;
            localStorage.setItem('office_toilet_log', JSON.stringify(dataLog));
            segarkanTabel();
        }
    };

    function segarkanTabel() {
        const tbody = document.getElementById('tabel-body');
        const kosongBox = document.getElementById('status-kosong');
        
        tbody.innerHTML = "";

        if (dataLog.length === 0) {
            kosongBox.style.display = "block";
            return;
        }
        kosongBox.style.display = "none";

        dataLog.forEach((item, index) => {
            const baris = document.createElement('tr');
            baris.innerHTML = `
                <td style="text-align: center; color: #94a3b8;">${index + 1}</td>
                <td style="font-weight: bold;">👤 ${item.nama}</td>
                <td>${item.jam}</td>
                <td style="color: #f59e0b; font-weight: bold;" id="timer-${item.id}">00m 00s</td>
                <td style="text-align: center;"><button class="btn-kembali" onclick="hapusIzin('${item.id}')">✔ Kembali</button></td>
            `;
            tbody.appendChild(baris);
        });
    }

    setInterval(() => {
        const kini = new Date().getTime();
        dataLog.forEach(item => {
            const elementTimer = document.getElementById(`timer-${item.id}`);
            if (elementTimer) {
                const selisihDetik = Math.floor((kini - item.start) / 1000);
                const menit = String(Math.floor(selisihDetik / 60)).padStart(2, '0');
                const detik = String(selisihDetik % 60).padStart(2, '0');
                elementTimer.innerText = `${menit}m ${detik}s`;
            }
        });
    }, 1000);

    window.addEventListener('storage', () => {
        dataLog = JSON.parse(localStorage.getItem('office_toilet_log')) || [];
        segarkanTabel();
    });

    segarkanTabel();
</script>

</body>
</html>
